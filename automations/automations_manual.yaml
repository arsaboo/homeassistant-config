#################################################################
## Security System
#################################################################

- id: abode_ios_notifications
  alias: Abode Actionable Notification
  trigger:
    - platform: event
      event_type: abode_alarm
  action:
    - service: notify.ios
      data:
        message: 'Abode alarm triggered!'
        data:
          push:
            badge: 0
            category: "abode_alarm"

- id: disarm_abode_from_away
  alias: 'Disarm Abode from Away'
  initial_state: 'on'
  condition:
    - condition: state
      entity_id: input_select.abodestatus
      state: 'armed_away'
    - condition: state
      entity_id: input_boolean.abodeupdate
      state: 'on'
    - condition: template
      value_template: >
        {%- if states.automation.arm_abode.attributes.last_triggered -%}
          {{ (as_timestamp(now()) - as_timestamp(states.automation.arm_abode.attributes.last_triggered)) > 240 }}
        {%- else -%}
          true
        {%- endif -%}
  trigger:
    - platform: state
      entity_id: group.household
      from: 'not_home'
      to: 'home'
    - platform: event
      event_type: ios.notification_action_fired
      event_data:
        actionName: DISARM_ABODE
  action:
     service: homeassistant.turn_on
     entity_id: script.abodestandby

- id: disarm_abode_at_night
  alias: 'Disarm Abode at night'
  initial_state: 'on'
  condition:
    - condition: state
      entity_id: input_select.abodestatus
      state: 'armed_home'
    - condition: state
      entity_id: input_boolean.abodeupdate
      state: 'on'
  trigger:
   - platform: state
     entity_id:
       - device_tracker.meta_rashmi
       - device_tracker.meta_alok
     from: 'not_home'
     to: 'home'
  action:
    service: homeassistant.turn_on
    entity_id: script.abodestandby

- id: abode_home_from_standby
  alias: 'Abode Home from Standby'
  initial_state: 'on'
  condition:
    condition: and
    conditions:
     - condition: state
       entity_id: input_select.abodestatus
       state: 'disarmed'
     - condition: time
       after: '22:15:00'
       before: '05:00:00'
     - condition: state
       entity_id: input_boolean.abodeupdate
       state: 'on'
     - condition: template
       value_template: >
         {%- if states.input_select.abodestatus.last_changed -%}
           {{ (as_timestamp(now()) - as_timestamp(states.input_select.abodestatus.last_changed)) > 300 }}
         {%- else -%}
           true
         {%- endif -%}
  trigger:
    - platform: time_pattern
      minutes: '/10'
  action:
    - service: homeassistant.turn_on
      entity_id: script.abodehome

- id: abode_standby
  alias: 'Abode Standby'
  initial_state: 'on'
  condition:
    condition: and
    conditions:
      - condition: state
        entity_id: group.household
        state: 'home'
      - condition: time
        after: '05:00:00'
        before: '21:45:00'
      - condition: state
        entity_id: input_boolean.abodeupdate
        state: 'on'
      - condition: template
        value_template: >
          {%- if states.input_select.abodestatus.last_changed -%}
            {{ (as_timestamp(now()) - as_timestamp(states.input_select.abodestatus.last_changed)) > 300 }}
          {%- else -%}
            true
          {%- endif -%}
      - condition: or
        conditions:
          - condition: state
            entity_id: input_select.abodestatus
            state: 'armed_home'
          - condition: state
            entity_id: input_select.abodestatus
            state: 'armed_away'
  trigger:
    - platform: time_pattern
      minutes: '/10'
  action:
    - service: homeassistant.turn_on
      entity_id: script.abodestandby

- id: abode_standby_2
  alias: 'Abode Standby_test'
  initial_state: 'on'
  condition:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: input_boolean.abodeupdate
      state: 'on'
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.abodestatus
          state: 'armed_home'
        - condition: state
          entity_id: input_select.abodestatus
          state: 'armed_away'
  trigger:
    - platform: time
      at: "05:30:00"
  action:
    - service: homeassistant.turn_on
      entity_id: script.abodestandby

- id: abode_arm
  alias: 'Arm Abode'
  initial_state: 'on'
  condition:
    - condition: state
      entity_id: input_boolean.abodeupdate
      state: 'on'
    - condition: template
      value_template: >
        {%- if states.automation.disarm_abode_from_away.attributes.last_triggered -%}
          {{ (as_timestamp(now()) - as_timestamp(states.automation.disarm_abode_from_away.attributes.last_triggered)) > 240 }}
        {%- else -%}
          true
        {%- endif -%}
    - condition: template
      value_template: "{{ states('input_select.abodestatus') != 'armed_away' }}"
  trigger:
    - platform: state
      entity_id: group.household
      from: 'home'
      to: 'not_home'
    - platform: state
      entity_id: group.household
      from: 'home'
      to: 'not_home'
      for: '00:10:00'
  action:
     service: homeassistant.turn_on
     entity_id: script.abodeaway

- id: abode_home_at_night
  alias: 'Abode Home at night'
  initial_state: 'on'
  condition:
    condition: and
    conditions:
     - condition: state
       entity_id: input_boolean.abodeupdate
       state: 'on'
     - condition: state
       entity_id: group.household
       state: 'home'
  trigger:
    platform: time
    at: '22:00:00'
  action:
    - service: homeassistant.turn_on
      entity_id: script.abodehome

- id: abode_disarm_morning
  alias: 'Disarm Abode in the morning'
  initial_state: 'on'
  condition:
    condition: and
    conditions:
     - condition: state
       entity_id: group.household
       state: 'home'
     - condition: state
       entity_id: input_boolean.abodeupdate
       state: 'on'
  trigger:
    - platform: time
      at: '05:20:00'
  action:
    - service: homeassistant.turn_on
      entity_id: script.abodestandby
    - service: automation.turn_on
      entity_id: automation.turn_off_master_lights
    - service: input_boolean.turn_off
      entity_id: input_boolean.sleeping
    - service: shell_command.delete_unifi

- id: disable_thermostat_away_mode
  alias: 'Disable thermostat away'
  initial_state: 'on'
  condition:
    - condition: template
      value_template: >
        {{states('input_select.abodestatus') == 'disarmed' and states('group.thermostats') == 'on'}}
  trigger:
    - platform: time_pattern
      minutes: '/5'
  action:
    - service: homeassistant.turn_off
      data_template:
        entity_id: >
          {%- if states('switch.downstairs_away') == 'on' -%}
            switch.downstairs_away
          {%- elif states('switch.upstairs_away') == 'on' -%}
            switch.upstairs_away
          {%- elif states('switch.bedroom_away') == 'on' -%}
            switch.bedroom_away
          {%- endif -%}

- id: enable_thermostat_away_mode
  alias: 'Enable thermostat away'
  initial_state: 'on'
  condition:
    - condition: template
      value_template: >
        {%- if state_attr("automation.enable_thermostat_away", "last_triggered") -%}
          {{ (as_timestamp(now()) - as_timestamp(state_attr("automation.enable_thermostat_away", "last_triggered"))) > 900 }}
        {%- else -%}
          true
        {%- endif -%}
    - condition: or
      conditions:
        - condition: template
          value_template: >
            {{states('input_select.abodestatus') == 'armed_away' and states('switch.downstairs_away') == 'off'}}
        - condition: template
          value_template: >
            {{states('input_select.abodestatus') == 'armed_away' and states('switch.upstairs_away') == 'off'}}
        - condition: template
          value_template: >
            {{states('input_select.abodestatus') == 'armed_away' and states('switch.bedroom_away') == 'off'}}
  trigger:
    - platform: time_pattern
      minutes: '/5'
    - platform: event
      event_type: resume_thermostat_schedule
  action:
    - service: homeassistant.turn_on
      data_template:
        entity_id: >
          {%- if states('switch.downstairs_away') == 'off' -%}
            switch.downstairs_away
          {%- elif states('switch.upstairs_away') == 'off' -%}
            switch.upstairs_away
          {%- elif states('switch.bedroom_away') == 'off' -%}
            switch.bedroom_away
          {%- endif -%}

