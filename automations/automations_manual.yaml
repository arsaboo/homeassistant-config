- id: prevent_overcharging_kasa
  alias: 'Prevent overcharging Kasa'
  initial_state: 'on'
  trigger:
    - platform: numeric_state
      entity_id: sensor.smart_wifi_current_consumption
      below: 2
      for: '00:05:00'
  condition:
    - condition: state
      entity_id: switch.smart_wifi
      state: 'on'
  action:
     service: switch.turn_off
     data:
       entity_id: switch.smart_wifi

- id: prevent_overcharging_kasa_3
  alias: 'Prevent overcharging Kasa_3'
  initial_state: 'on'
  trigger:
    - platform: numeric_state
      entity_id: sensor.kasa_plug_3_current_consumption
      below: 1
      for: '00:05:00'
  condition:
    - condition: state
      entity_id: switch.kasa_plug_3
      state: 'on'
  action:
     service: switch.turn_off
     data:
       entity_id: switch.kasa_plug_3

- id: prevent_overcharging_wemo
  alias: 'Prevent overcharging wemo'
  initial_state: 'on'
  trigger:
    - platform: numeric_state
      entity_id: sensor.wemoinsight_current_power
      below: 2
      for: '00:05:00'
  condition:
    - condition: state
      entity_id: switch.wemoinsight
      state: 'on'
  action:
     service: switch.turn_off
