- id: 'micube_scenes_reset'
  alias: MiCube scene reset
  description: ''
  condition:
    - condition: state
      entity_id: light.master_lights
      state: 'on'
  use_blueprint:
    path: Mikkelmoeller/aqara-magic-cube-zha-51-actions.yaml
    input:
      remote: 71101203d390d0827bcfe7875186373a
      knock_any_side: true
      cube_knock_any:
      - service: script.set_hue_scene
        data_template:
          group: "Master"
          scene: "Bright"

- id: 'micube_master_scenes'
  alias: "MiCube Master scene"
  description: ''
  condition:
    - condition: state
      entity_id: light.master_lights
      state: 'on'
  use_blueprint:
    path: Mikkelmoeller/aqara-magic-cube-zha-51-actions.yaml
    input:
      remote: 71101203d390d0827bcfe7875186373a
      cube_knock_any: []
      cube_flip_90:
      - service: script.set_hue_scene
        data_template:
          group: "Master"
          scene: >
            {{ ['Arctic aurora', 'Galaxy', 'Starlight', 'Nightlight', 'Savanna sunset', 'Spring blossom', 'Tropical twilight'] | random  }}
      - service: automation.turn_off
        entity_id: automation.turn_off_master_lights
      flip_90: true

