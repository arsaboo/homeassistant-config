- id: sunroom_lights
  alias: 'Control Sunroom lights based on motion'
  initial_state: 'on'
  trigger:
    - platform: state
      entity_id: binary_sensor.sunroom_motion_3
      from: 'off'
      to: 'on'
      id: 'motion_detected'
    - platform: state
      entity_id: binary_sensor.sunroom_motion_3
      from: 'on'
      to: 'off'
      for:
        minutes: 5
      id: 'no_motion'
  action:
    - choose:
        - conditions:
            - condition: trigger
              id: 'motion_detected'
            # - condition: state
            #   entity_id: sun.sun
            #   state: 'below_horizon'
            - condition: template
              value_template: "{{ is_state('sun.sun', 'below_horizon') or (as_timestamp(state_attr('sun.sun', 'next_setting')) - as_timestamp(now()) < 2700 and as_timestamp(now()) - as_timestamp(state_attr('sun.sun', 'last_setting')) > 2700) }}"
            - condition: state
              entity_id: light.sunroom_lights
              state: 'off'
          sequence:
            - service: light.turn_on
              data:
                entity_id: light.sunroom_lights
                effect: Default
                brightness: 128
            - service: light.turn_on
              data:
                entity_id: light.deck_floor
        - conditions:
            - condition: trigger
              id: 'no_motion'
            - condition: or
              conditions:
                - condition: state
                  entity_id: light.sunroom_lights
                  state: 'on'
                - condition: state
                  entity_id: light.deck_floor
                  state: 'on'
          sequence:
            - service: light.turn_off
              entity_id:
                - light.sunroom_lights
                - light.deck_floor
