- id: prevent_hvac_failure_2
  alias: 'Prevent HVAC Failure 2'
  initial_state: 'on'
  trigger:
    - platform: state
      entity_id:
        - sensor.master_thermostat
      to: 'cooling'
      for: '00:03:00'
    - platform: state
      entity_id:
        - sensor.master_thermostat
      to: 'heating'
      for: '00:03:00'
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.state == 'heating' and states('sensor.temperature_158d0001a35ba5')|int > 50 }}"
  action:
    - service: logbook.log
      data:
        name: "Master vent: "
        message: "Vent Temp is {{ states('sensor.temperature_158d0001a35ba5') }} and pressure is {{ states('sensor.pressure_158d0001a35ba5') }}. Temp efficiency is {{ states('sensor.master_temp_change') }} min/deg."

- id: notify_if_living_room_hvac_not_working
  alias: 'Notify if living room HVAC not working'
  initial_state: 'on'
  trigger:
    - platform: state
      entity_id:
        - sensor.downstairs_thermostat
      to: 'cooling'
      for: '00:05:00'
    - platform: state
      entity_id:
        - sensor.downstairs_thermostat
      to: 'heating'
      for: '00:05:00'
  condition:
    condition: or
    conditions:
      - condition: template
        value_template: "{{ trigger.to_state.state == 'heating' and states('sensor.vent')|int < 80 }}"
      - condition: template
        value_template: "{{ trigger.to_state.state == 'cooling' and states('sensor.vent')|int > 70 }}"
  action:
    - service: logbook.log
      data:
        name: "Living Room Vent: "
        message: "Thermostat is {{ trigger.to_state.state }} for the last 5 minutes. Downstairs temp efficiency is {{ states('sensor.downstairs_temp_change') }} min/deg. Current vent temp is {{ states('sensor.vent') }}."
    - service: notify.mobile_app_alokphone
      data_template:
        message: >
          Check Master Thermostat
        data:
          subtitle: "Downstairs thermostat {{ trigger.to_state.state }} for 5 minutes. Temp efficiency is {{ states('sensor.downstairs_temp_change') }} min/deg."
          push:
            badge: 0

- id: notify_if_master_room_hvac_not_working
  alias: 'Notify if master room HVAC not working'
  initial_state: 'on'
  trigger:
    - platform: state
      entity_id:
        - sensor.master_thermostat
      to: 'cooling'
      for: '00:03:00'
    - platform: state
      entity_id:
        - sensor.master_thermostat
      to: 'heating'
      for: '00:03:00'
  condition:
    condition: or
    conditions:
      - condition: template
        value_template: "{{ trigger.to_state.state == 'heating' and states('sensor.master_vent')|int < 80 }}"
      - condition: template
        value_template: "{{ trigger.to_state.state == 'cooling' and states('sensor.master_vent')|int > 70 }}"
  action:
    - service: logbook.log
      data:
        name: "Master Room Vent: "
        message: "Temp is {{ states('sensor.master_vent') }}. Temp efficiency is {{ states('sensor.master_temp_change') }} min/deg."
    - service: notify.mobile_app_alokphone
      data_template:
        message: >
          Check Master Thermostat
        data:
          subtitle: "Master thermostat {{ trigger.to_state.state }} for 3 minutes. Temp efficiency is {{ states('sensor.master_temp_change') }} min/deg."
          push:
            badge: 0

