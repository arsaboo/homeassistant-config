- alias: "Apple Watch: set lights"
  mode: parallel
  trigger:
    platform: event
    event_type: ios.action_fired
    event_data:
      actionName: "Set lights"
  action:
    - variables:
        iphone: >
          notify.mobile_app_{{ trigger.event.data.sourceDeviceName.replace(' ', '_').replace("'", '_')|lower }}
        action_on: "{{ 'ON' }}"
        action_off: "{{ 'OFF' }}"
        action_master: "{{ 'MASTER' }}"
        action_living_room: "{{ 'LIVING_ROOM' }}"
        action_kitchen: "{{ 'KITCHEN' }}"
    - service: "{{ iphone }}"
      data:
        message: "Choose Light"
        data:
          actions:
            - action: "{{ action_master }}"
              title: "Master"
            - action: "{{ action_living_room }}"
              title: "Living Room"
            - action: "{{ action_kitchen }}"
              title: "Kitchen"
    - wait_for_trigger:
        - platform: event
          event_type: mobile_app_notification_action
          event_data:
            action: "{{ action_master }}"
        - platform: event
          event_type: mobile_app_notification_action
          event_data:
            action: "{{ action_living_room }}"
        - platform: event
          event_type: mobile_app_notification_action
          event_data:
            action: "{{ action_kitchen }}"
    - choose:
        - conditions: "{{ wait.trigger.event.data.action == action_master }}"
          sequence:
            - variables:
                lights:
                  - light.master_lights
            - service: "{{ iphone }}"
              data:
                message: "Choose option"
                data:
                  actions:
                    - action: "{{ action_on }}"
                      title: "Turn On"
                    - action: "{{ action_off }}"
                      title: "Turn Off"
            - wait_for_trigger:
                - platform: event
                  event_type: mobile_app_notification_action
                  event_data:
                    action: "{{ action_on }}"
                - platform: event
                  event_type: mobile_app_notification_action
                  event_data:
                    action: "{{ action_off }}"
            - choose:
                - conditions: "{{ wait.trigger.event.data.action == action_on }}"
                  sequence:
                    - service: light.turn_on
                      target:
                        entity_id: "{{ lights }}"
                - conditions: "{{ wait.trigger.event.data.action == action_off }}"
                  sequence:
                    - service: light.turn_off
                      target:
                        entity_id: "{{ lights }}"

        - conditions: "{{ wait.trigger.event.data.action == action_living_room }}"
          sequence:
            - variables:
                lights:
                  - light.living_room_lights
            - service: "{{ iphone }}"
              data:
                message: "Choose option"
                data:
                  actions:
                    - action: "{{ action_on }}"
                      title: "Turn On"
                    - action: "{{ action_off }}"
                      title: "Turn Off"
            - wait_for_trigger:
                - platform: event
                  event_type: mobile_app_notification_action
                  event_data:
                    action: "{{ action_on }}"
                - platform: event
                  event_type: mobile_app_notification_action
                  event_data:
                    action: "{{ action_off }}"
            - choose:
                - conditions: "{{ wait.trigger.event.data.action == action_on }}"
                  sequence:
                    - service: light.turn_on
                      target:
                        entity_id: "{{ lights }}"
                - conditions: "{{ wait.trigger.event.data.action == action_off }}"
                  sequence:
                    - service: light.turn_off
                      target:
                        entity_id: "{{ lights }}"
        - conditions: "{{ wait.trigger.event.data.action == action_kitchen }}"
          sequence:
            - variables:
                lights:
                  - light.kitchen
            - service: "{{ iphone }}"
              data:
                message: "Choose option"
                data:
                  actions:
                    - action: "{{ action_on }}"
                      title: "Turn On"
                    - action: "{{ action_off }}"
                      title: "Turn Off"
            - wait_for_trigger:
                - platform: event
                  event_type: mobile_app_notification_action
                  event_data:
                    action: "{{ action_on }}"
                - platform: event
                  event_type: mobile_app_notification_action
                  event_data:
                    action: "{{ action_off }}"
            - choose:
                - conditions: "{{ wait.trigger.event.data.action == action_on }}"
                  sequence:
                    - service: light.turn_on
                      target:
                        entity_id: "{{ lights }}"
                - conditions: "{{ wait.trigger.event.data.action == action_off }}"
                  sequence:
                    - service: light.turn_off
                      target:
                        entity_id: "{{ lights }}"






- alias: "Apple Watch: set network"
  mode: parallel
  trigger:
    platform: event
    event_type: ios.action_fired
    event_data:
      actionName: Set network
  action:
    - variables:
        iphone: >
          notify.mobile_app_{{ trigger.event.data.sourceDeviceName.replace(' ', '_').replace("'", '_')|lower }}
    - service: "{{ iphone }}"
      data:
        message: "Apple Watch: set network"
        data:
          push:
            category: set_network
    - wait_for_trigger:
        platform: event
        event_type: ios.notification_action_fired
        event_data:
          categoryName: set_network
      timeout: "00:00:20"
      continue_on_timeout: false
    - variables:
        device: >
          {{
            {'RISHAANFIREHD': 'switch.firehd_rishaan',
             'ARNAV_IPAD': 'switch.my_ipad',
             'LENOVO': 'switch.lenovohome',
             'TOSHIBA_AIO': 'switch.toshibaaio',
             'SAMMY_TV': 'switch.samsungtv',
            }[wait.trigger.event.data.actionName] }}
    - service: "{{ iphone }}"
      data:
        message: "Apple Watch: choose option"
        data:
          push:
            category: device_options
    - wait_for_trigger:
        platform: event
        event_type: ios.notification_action_fired
        event_data:
          categoryName: device_options
      timeout: "00:00:20"
      continue_on_timeout: false
    - variables:
        option: "{{ wait.trigger.event.data.actionName }}"
    - choose:
        - conditions: "{{ option == 'OFF' }}"
          sequence:
            service: switch.turn_off
            data:
              entity_id: "{{ device }}"
        - conditions: "{{ option == 'ON' }}"
          sequence:
            service: switch.turn_on
            data:
              entity_id: "{{ device }}"

