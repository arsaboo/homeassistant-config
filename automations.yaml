- id: thermostat_proximity_approaching
  alias: Thermostat - Pre-condition when approaching
  description: 'Turn off away mode when the nearest person is heading towards home
    and within 5 miles. Fires on direction change to ''towards'' or when distance
    drops below threshold while already heading towards.

    '
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.home_nearest_direction_of_travel
    to: towards
  - platform: numeric_state
    entity_id: sensor.home_nearest_distance
    below: 5280
  condition:
  - condition: state
    entity_id: sensor.home_nearest_direction_of_travel
    state: towards
  - condition: numeric_state
    entity_id: sensor.home_nearest_distance
    below: 5280
  - condition: or
    conditions:
    - condition: state
      entity_id: switch.downstairs_away
      state: 'on'
    - condition: state
      entity_id: switch.upstairs_away
      state: 'on'
    - condition: state
      entity_id: switch.bedroom_away
      state: 'on'
  action:
  - service: homeassistant.turn_off
    target:
      entity_id:
      - switch.downstairs_away
      - switch.upstairs_away
      - switch.bedroom_away
  - service: notify.mobile_app_alokphone2
    data:
      title: Home Pre-conditioned
      message: '{{ states(''sensor.home_nearest_device'') }} is heading home (~{{
        (states(''sensor.home_nearest_distance'') | float / 5280) | round(1) }} miles
        away). Thermostats switched to home mode.

        '
- id: thermostat_proximity_revert
  alias: Thermostat - Revert to away when not coming home
  description: 'Re-enable away mode when nearest person turns away or goes stationary
    while still more than 3 miles out and nobody is currently home. Handles the case
    where someone started heading home but changed direction.

    '
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.home_nearest_direction_of_travel
    to: away_from
  - platform: state
    entity_id: sensor.home_nearest_direction_of_travel
    to: stationary
  condition:
  - condition: numeric_state
    entity_id: sensor.home_nearest_distance
    above: 15840
  - condition: state
    entity_id: group.Household
    state: not_home
  - condition: or
    conditions:
    - condition: state
      entity_id: switch.downstairs_away
      state: 'off'
    - condition: state
      entity_id: switch.upstairs_away
      state: 'off'
    - condition: state
      entity_id: switch.bedroom_away
      state: 'off'
  action:
  - service: homeassistant.turn_on
    target:
      entity_id:
      - switch.downstairs_away
      - switch.upstairs_away
      - switch.bedroom_away
- id: thermostat_proximity_arrived
  alias: Thermostat - Confirm home on arrival
  description: 'Ensure thermostats are fully in home mode when someone arrives. Safety
    net in case pre-condition did not fire.

    '
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.home_nearest_direction_of_travel
    to: arrived
  condition:
  - condition: or
    conditions:
    - condition: state
      entity_id: switch.downstairs_away
      state: 'on'
    - condition: state
      entity_id: switch.upstairs_away
      state: 'on'
    - condition: state
      entity_id: switch.bedroom_away
      state: 'on'
  action:
  - service: homeassistant.turn_off
    target:
      entity_id:
      - switch.downstairs_away
      - switch.upstairs_away
      - switch.bedroom_away
- id: thermostat_proximity_all_left
  alias: Thermostat - Enable away when everyone leaves
  description: 'Enable away mode 10 minutes after the last person leaves home. Enable
    thermostat away mode 10 minutes after the last person leaves home.

    '
  mode: single
  trigger:
  - platform: state
    entity_id:
    - person.alok
    - person.rashmi
    - person.arnav
    to: not_home
  condition:
  - condition: state
    entity_id: person.alok
    state: not_home
  - condition: state
    entity_id: person.rashmi
    state: not_home
  - condition: state
    entity_id: person.arnav
    state: not_home
  - condition: or
    conditions:
    - condition: state
      entity_id: switch.downstairs_away
      state: 'off'
    - condition: state
      entity_id: switch.upstairs_away
      state: 'off'
    - condition: state
      entity_id: switch.bedroom_away
      state: 'off'
  action:
  - delay: 00:10:00
  - condition: state
    entity_id: group.Household
    state: not_home
  - service: homeassistant.turn_on
    target:
      entity_id:
      - switch.downstairs_away
      - switch.upstairs_away
      - switch.bedroom_away
- id: '1777563985580'
  alias: Wake TV on turn_on (WoL)
  description: Explicit Wake-on-LAN replacement for deprecated implicit WoL. Sends
    magic packet to Living Room TV (64:1c:ae:a6:c7:33) when media_player.turn_on is
    called.
  triggers:
  - platform: event
    event_type: call_service
    event_data:
      domain: media_player
      service: turn_on
      service_data:
        entity_id: media_player.living_room_tv
  actions:
  - data:
      mac: 64:1c:ae:a6:c7:33
    action: wake_on_lan.send_magic_packet
  mode: single
- id: '1777663814883'
  alias: Handle Close Garage Notification Action
  triggers:
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: CLOSE_GARAGE
  actions:
  - target:
      entity_id: switch.shelly_garage
    action: switch.turn_on
- id: '1777664263465'
  alias: Garage door left open — notify
  triggers:
  - platform: state
    entity_id: cover.garagedoor
    to: open
    for: 00:15:00
  actions:
  - data:
      title: Garage Door
      message: Garage door has been open for 15 minutes
      data:
        push:
          badge: 0
        actions:
        - action: CLOSE_GARAGE
          title: Close Garage Door
    action: notify.mobile_app_alokphone2
