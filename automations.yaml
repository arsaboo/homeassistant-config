- id: thermostat_proximity_approaching
  alias: 'Thermostat - Pre-condition when approaching'
  description: >
    Turn off away mode when the nearest person is heading towards home and
    within 5 miles. Fires on direction change to 'towards' or when distance
    drops below threshold while already heading towards.
  initial_state: 'on'
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.home_nearest_direction_of_travel
      to: 'towards'
    - platform: numeric_state
      entity_id: sensor.home_nearest_distance
      below: 26400
  condition:
    - condition: state
      entity_id: sensor.home_nearest_direction_of_travel
      state: 'towards'
    - condition: numeric_state
      entity_id: sensor.home_nearest_distance
      below: 26400
    - condition: or
      conditions:
        - condition: state
          entity_id: switch.downstairs_away
          state: 'on'
        - condition: state
          entity_id: switch.upstairs_away
          state: 'on'
        - condition: state
          entity_id: switch.bedroom_away
          state: 'on'
  action:
    - service: homeassistant.turn_off
      target:
        entity_id:
          - switch.downstairs_away
          - switch.upstairs_away
          - switch.bedroom_away
    - service: notify.ios
      data:
        title: "Home Pre-conditioned"
        message: >
          {{ states('sensor.home_nearest_device') }} is heading home
          (~{{ (states('sensor.home_nearest_distance') | float / 5280) | round(1) }} miles away).
          Thermostats switched to home mode.

- id: thermostat_proximity_revert
  alias: 'Thermostat - Revert to away when not coming home'
  description: >
    Re-enable away mode when nearest person turns away or goes stationary
    while still more than 3 miles out and nobody is currently home.
    Handles the case where someone started heading home but changed direction.
  initial_state: 'on'
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.home_nearest_direction_of_travel
      to: 'away_from'
    - platform: state
      entity_id: sensor.home_nearest_direction_of_travel
      to: 'stationary'
  condition:
    - condition: numeric_state
      entity_id: sensor.home_nearest_distance
      above: 15840
    - condition: state
      entity_id: group.Household
      state: 'not_home'
    - condition: or
      conditions:
        - condition: state
          entity_id: switch.downstairs_away
          state: 'off'
        - condition: state
          entity_id: switch.upstairs_away
          state: 'off'
        - condition: state
          entity_id: switch.bedroom_away
          state: 'off'
  action:
    - service: homeassistant.turn_on
      target:
        entity_id:
          - switch.downstairs_away
          - switch.upstairs_away
          - switch.bedroom_away

- id: thermostat_proximity_arrived
  alias: 'Thermostat - Confirm home on arrival'
  description: >
    Ensure thermostats are fully in home mode when someone arrives.
    Safety net in case pre-condition did not fire.
  initial_state: 'on'
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.home_nearest_direction_of_travel
      to: 'arrived'
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: switch.downstairs_away
          state: 'on'
        - condition: state
          entity_id: switch.upstairs_away
          state: 'on'
        - condition: state
          entity_id: switch.bedroom_away
          state: 'on'
  action:
    - service: homeassistant.turn_off
      target:
        entity_id:
          - switch.downstairs_away
          - switch.upstairs_away
          - switch.bedroom_away

- id: thermostat_proximity_all_left
  alias: 'Thermostat - Enable away when everyone leaves'
  description: >
    Enable away mode 10 minutes after the last person leaves home.
    Enable thermostat away mode 10 minutes after the last person leaves home.
  initial_state: 'on'
  mode: single
  trigger:
    - platform: state
      entity_id:
        - person.alok
        - person.rashmi
        - person.arnav
      to: 'not_home'
  condition:
    - condition: state
      entity_id: person.alok
      state: 'not_home'
    - condition: state
      entity_id: person.rashmi
      state: 'not_home'
    - condition: state
      entity_id: person.arnav
      state: 'not_home'
    - condition: or
      conditions:
        - condition: state
          entity_id: switch.downstairs_away
          state: 'off'
        - condition: state
          entity_id: switch.upstairs_away
          state: 'off'
        - condition: state
          entity_id: switch.bedroom_away
          state: 'off'
  action:
    - delay: '00:10:00'
    - condition: state
      entity_id: group.Household
      state: 'not_home'
    - service: homeassistant.turn_on
      target:
        entity_id:
          - switch.downstairs_away
          - switch.upstairs_away
          - switch.bedroom_away
