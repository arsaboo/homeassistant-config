- id: battery_alert
  alias: Battery Alert
  initial_state: 'on'
  trigger:
  - platform: state
    entity_id: sensor.battery_status
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state | length > 0 }}

      '
  action:
  - service: persistent_notification.create
    data_template:
      title: Low Battery levels
      notification_id: low-battery-alert
      message: 'Check battery: {{ states(''sensor.battery_status'') }}

        '
  - service: notify.pushbullet
    data_template:
      title: Battery status
      message: 'Check battery: {{ states(''sensor.battery_status'') }}

        '
- id: heal_zwave_network
  alias: Heal Z-Wave Network
  initial_state: 'on'
  trigger:
    platform: time
    at: '2:31:00'
  action:
    service: zwave.heal_network
- id: update_available_notification
  alias: Update Available Notification
  initial_state: 'on'
  trigger:
    platform: template
    value_template: '{{states(''sensor.pypi_hass_version'') == states(''sensor.current_version'')
      }}'
  action:
  - service: notify.pushbullet
    data:
      message: HomeAssistant {{ states('sensor.pypi_hass_version') }} is now available
      title: Update HASS
  - service: persistent_notification.create
    data:
      title: Update Available
      message: 'Home Assistant {{ states(''sensor.pypi_hass_version'') }} is available,
        please update.

        '
      notification_id: update_available
- id: change_current_theme
  alias: Change Current Theme
  initial_state: 'on'
  trigger:
  - platform: state
    entity_id: input_select.current_theme
  action:
  - service: frontend.set_theme
    data_template:
      name: '{{states(''input_select.current_theme'')}}'
- id: update_morning_commute_sensor
  alias: Commute - Update morning commute sensor
  initial_state: 'off'
  trigger:
  - platform: time_pattern
    minutes: /2
  condition:
  - condition: time
    after: 08:00:00
    before: '11:00:00'
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  - condition: state
    entity_id: person.alok
    state: home
  action:
  - service: homeassistant.update_entity
    data:
      entity_id: sensor.morning_commute
- id: update_evening_commute_sensor
  alias: Commute - Update evening commute sensor
  initial_state: 'off'
  trigger:
  - platform: time_pattern
    minutes: /2
  condition:
  - condition: time
    after: '17:00:00'
    before: '20:00:00'
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  - condition: template
    value_template: "{%- if states('person.alok') -%}\n  {{ states('person.alok')|lower
      in ('buckhead', 'downtown') }}\n{%- else -%}\n  false\n{%- endif -%}\n"
  action:
  - service: homeassistant.update_entity
    data:
      entity_id: sensor.alok_to_home
- id: morning_commute
  alias: Morning Commute
  initial_state: 'off'
  condition:
    condition: and
    conditions:
    - condition: time
      after: 08:15:00
      before: '11:00:00'
    - condition: time
      weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
    - condition: state
      entity_id: person.alok
      state: home
  trigger:
    platform: numeric_state
    entity_id: sensor.morning_commute
    below: 43
  action:
  - service: notify.pushbullet
    data:
      message: Commute time is 43 minutes
      title: Leave for Work
      target: device/myiPhone
  - service: homeassistant.turn_on
    entity_id: script.notificationleavework
- id: evening_commute
  alias: Evening Commute
  initial_state: 'off'
  condition:
    condition: and
    conditions:
    - condition: time
      after: '17:00:00'
      before: '20:00:00'
    - condition: time
      weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
    - condition: template
      value_template: "{%- if states('person.alok') -%}\n  {{ states('person.alok')
        != 'home' }}\n{%- else -%}\n  false\n{%- endif -%}\n"
  trigger:
    platform: template
    value_template: "{%- if states.sensor.alok_to_home.attributes.duration_in_traffic
      -%}\n  {{(states.sensor.alok_to_home.attributes.duration_in_traffic.split('
      ')[0]|int) / (states.sensor.alok_to_home.attributes.duration.split(' ')[0]|int)
      < 1.25}}\n{%- else -%}\n  false\n{%- endif -%}\n"
  action:
    service: notify.pushbullet
    data_template:
      message: Commute time is {{states.sensor.alok_to_home.attributes.duration_in_traffic.split('
        ')[0]|int}} minutes
      title: Leave for Home
      target: device/myiPhone
- id: plexspy_notification
  alias: Plex Spy notification
  initial_state: 'off'
  trigger:
    platform: state
    entity_id: sensor.plex
  action:
  - service: notify.pushbullet
    data_template:
      message: "{%- if states.sensor.plex.attributes -%}\n  {% set space = joiner('
        ') %}\n  {%- for attr in states.sensor.plex.attributes -%}\n   {%- if not
        attr==\"friendly_name\" and not attr==\"unit_of_measurement\" and not attr==\"homebridge_hidden\"
        and not attr==\"icon\"-%}\n    {{space()}}{{attr}} is watching {{states.sensor.plex.attributes[attr]}}.\n
        \  {%- endif -%}\n  {%- endfor -%}\n{%- endif -%}\n"
      title: 'Plex {{ trigger.to_state.state }} people streaming. '
      target: device/myiPhone
  - service: logbook.log
    data_template:
      name: 'Plex {{ trigger.to_state.state }} people streaming. '
      message: "{%- if states.sensor.plex.attributes -%}\n  {% set space = joiner('
        ') %}\n  {%- for attr in states.sensor.plex.attributes -%}\n   {%- if not
        attr==\"friendly_name\" and not attr==\"unit_of_measurement\" and not attr==\"homebridge_hidden\"
        and not attr==\"icon\"-%}\n    {{space()}}{{attr}} is watching {{states.sensor.plex.attributes[attr]}}.\n
        \  {%- endif -%}\n  {%- endfor -%}\n{%- endif -%}\n"
