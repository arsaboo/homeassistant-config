- id: person_logging
  alias: Log person changes
  initial_state: 'on'
  trigger:
  - platform: state
    entity_id:
    - person.alok
    - person.rashmi
    - person.arnav
  condition:
  - condition: template
    value_template: '{{ trigger.from_state.state != trigger.to_state.state }}'
  action:
  - service: logbook.log
    data_template:
      name: 'Person: '
      message: '{{trigger.to_state.name}} changed from {{trigger.from_state.state}}
        to {{trigger.to_state.state}} by {{ trigger.to_state.attributes.source }}'
- id: alarm_disarm_on_arrival
  alias: Disarm alarm when someone arrives home
  initial_state: 'on'
  mode: single
  trigger:
  - platform: state
    entity_id: group.household
    from: not_home
    to: home
  condition:
  - condition: state
    entity_id: input_boolean.alarm_automation
    state: 'on'
  - condition: not
    conditions:
      - condition: state
        entity_id: alarm_control_panel.simplisafe_2
        state: disarmed
  action:
    service: script.turn_on
    entity_id: script.alarm_standby
- id: close_garage_door_notification
  alias: Close Garage Door Notification
  initial_state: 'on'
  condition:
    condition: state
    entity_id: cover.garagedoor
    state: open
  trigger:
  - platform: state
    entity_id: alarm_control_panel.simplisafe_2
    to: armed_home
  - platform: state
    entity_id: alarm_control_panel.simplisafe_2
    to: armed_away
  action:
  - service: notify.pushbullet
    data:
      message: Garage Door Open
      title: Garage Door Open
  - service: homeassistant.turn_on
    entity_id: script.notificationgaragedoor
- id: alarm_arm_away_on_departure
  alias: Arm alarm when everyone leaves
  initial_state: 'on'
  mode: single
  trigger:
  - platform: state
    entity_id: group.household
    from: home
    to: not_home
    for: 00:10:00
  condition:
  - condition: state
    entity_id: input_boolean.alarm_automation
    state: 'on'
  - condition: state
    entity_id: alarm_control_panel.simplisafe_2
    state: disarmed
  action:
    service: script.turn_on
    entity_id: script.alarm_away
- id: alarm_arm_home_at_night
  alias: Arm alarm to home mode at night
  initial_state: 'on'
  condition:
  - condition: state
    entity_id: input_boolean.alarm_automation
    state: 'on'
  - condition: state
    entity_id: group.household
    state: home
  trigger:
    platform: time
    at: '22:00:00'
  action:
  - service: script.turn_on
    entity_id: script.alarm_home
- id: morning_routine
  alias: Morning Routine
  initial_state: 'on'
  condition:
    condition: state
    entity_id: group.household
    state: home
  trigger:
  - platform: time
    at: 05:20:00
  action:
  - service: automation.turn_on
    entity_id: automation.turn_off_master_lights
  - service: input_boolean.turn_off
    entity_id: input_boolean.sleeping
  - service: shell_command.delete_unifi
- id: enable_recording
  alias: Enable Recording
  initial_state: 'on'
  trigger:
    platform: state
    entity_id: input_boolean.startrecording
    to: 'on'
  action:
    service: switch.turn_on
    entity_id: switch.foscam_record
- id: disable_recording
  alias: Disable Recording
  initial_state: 'on'
  trigger:
    platform: state
    entity_id: input_boolean.startrecording
    to: 'off'
  action:
    service: switch.turn_off
    entity_id: switch.foscam_record
- id: image_processing_scan
  alias: Image Processing Scan
  mode: queued
  initial_state: 'on'
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.backyard_field_detection
    - binary_sensor.driveway_field_detection
    - binary_sensor.patio_field_detection
    - binary_sensor.porch_field_detection
    - binary_sensor.backyard_line_crossing
    - binary_sensor.driveway_line_crossing
    - binary_sensor.patio_line_crossing
    - binary_sensor.porch_line_crossing
    - binary_sensor.ring_front_door_motion
  action:
  - service: image_processing.scan
    data_template:
      entity_id: "{% if trigger.entity_id == \"binary_sensor.ring_front_door_motion\"
        %}\n  image_processing.tensorflow_porch\n{% else %}\n  image_processing.tensorflow_{{
        trigger.entity_id.split('.')[1].split('_')[0] }}\n{% endif %}\n"
- id: tf_image_processing_notification
  alias: TF image processing
  initial_state: 'on'
  mode: queued
  trigger:
  - platform: state
    entity_id:
    - image_processing.tensorflow_porch
    - image_processing.tensorflow_patio
    - image_processing.tensorflow_driveway
    - image_processing.tensorflow_backyard
    - image_processing.deepstack_porch
    - image_processing.deepstack_patio
    - image_processing.deepstack_driveway
    - image_processing.deepstack_backyard
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state |int > 0 }}'
  action:
  - service: logbook.log
    data_template:
      name: 'TF: '
      message: '{% for object in state_attr(trigger.entity_id,''matches'').keys()
        -%}{%- if loop.first %}{% elif loop.last %}, {% else %}, {% endif -%}{{ object|title
        }}{%- endfor %} detected in {{ trigger.entity_id.split(''.'')[1].split(''_'')[1]
        }}.'
- id: notify_camera_pictures
  alias: Notify camera pictures
  initial_state: 'off'
  condition:
  - condition: state
    entity_id: alarm_control_panel.simplisafe_2
    state: armed_away
  - condition: template
    value_template: "{%- if states.automation.notify_camera_pictures.attributes.last_triggered
      -%}\n  {{ (as_timestamp(now()) - as_timestamp(states.automation.notify_camera_pictures.attributes.last_triggered))
      > 300 }}\n{%- else -%}\n  true\n{%- endif -%}\n"
  - condition: template
    value_template: "{%- if trigger.entity_id == \"binary_sensor.backyard_field_detection\"
      or trigger.entity_id == \"binary_sensor.backyard_line_crossing\" -%} {{((as_timestamp(now())
      - as_timestamp(states.binary_sensor.backyard_motion.attributes.last_tripped_time)))|round|abs
      < 30}} {%- elif trigger.entity_id == \"binary_sensor.driveway_field_detection\"
      or trigger.entity_id == \"binary_sensor.driveway_line_crossing\" -%} {{((as_timestamp(now())
      - as_timestamp(states.binary_sensor.driveway_motion.attributes.last_tripped_time)))|round|abs
      < 30}} {%- elif trigger.entity_id == \"binary_sensor.patio_field_detection\"
      or trigger.entity_id == \"binary_sensor.patio_line_crossing\" -%} {{((as_timestamp(now())
      - as_timestamp(states.binary_sensor.patio_motion.attributes.last_tripped_time)))|round|abs
      < 30}} {%- elif trigger.entity_id == \"binary_sensor.porch_field_detection\"
      or trigger.entity_id == \"binary_sensor.porch_line_crossing\" -%} {{((as_timestamp(now())
      - as_timestamp(states.binary_sensor.porch_motion.attributes.last_tripped_time)))|round|abs
      < 30}} {%- else -%}\n  true\n{%- endif -%}\n"
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.backyard_field_detection
    - binary_sensor.driveway_field_detection
    - binary_sensor.patio_field_detection
    - binary_sensor.porch_field_detection
    - binary_sensor.backyard_line_crossing
    - binary_sensor.driveway_line_crossing
    - binary_sensor.patio_line_crossing
    - binary_sensor.porch_line_crossing
    from: 'off'
    to: 'on'
  action:
  - service: notify.ios
    data:
      message: Check {{ trigger.entity_id.split('.')[1].split('_')[0] }} camera.
      data:
        entity_id: camera.{{ trigger.entity_id.split('.')[1].split('_')[0] }}
        attachment:
          url: '{{ states.camera[trigger.entity_id.split(''.'')[1].split(''_'')[0]].attributes.entity_picture
            }}'
          content-type: jpg
  - service: logbook.log
    data_template:
      name: 'Camera activity: '
      message: "{%- for state in states if state.entity_id == trigger.entity_id -%}\n
        \ {{ state.attributes.friendly_name }} activated at {{ as_timestamp(now())
        | timestamp_custom('%I:%M:%S %p', true) }}.\n{%- endfor -%}"
  - service: logbook.log
    data_template:
      name: 'Motion detected: '
      message: "{%- if trigger.entity_id == \"binary_sensor.backyard_field_detection\"
        or trigger.entity_id == \"binary_sensor.backyard_line_crossing\" -%}\n  {{(as_timestamp(now())
        - as_timestamp(states.binary_sensor.backyard_motion.attributes.last_tripped_time))|round(2)}}
        seconds ago.\n{%- elif trigger.entity_id == \"binary_sensor.driveway_field_detection\"
        or trigger.entity_id == \"binary_sensor.driveway_line_crossing\" -%}\n  {{(as_timestamp(now())
        - as_timestamp(states.binary_sensor.driveway_motion.attributes.last_tripped_time))|round(2)}}
        seconds ago.\n{%- elif trigger.entity_id == \"binary_sensor.patio_field_detection\"
        or trigger.entity_id == \"binary_sensor.patio_line_crossing\" -%}\n  {{(as_timestamp(now())
        - as_timestamp(states.binary_sensor.patio_motion.attributes.last_tripped_time))|round(2)}}
        seconds ago.\n{%- elif trigger.entity_id == \"binary_sensor.porch_field_detection\"
        or trigger.entity_id == \"binary_sensor.porch_line_crossing\" -%}\n  {{(as_timestamp(now())
        - as_timestamp(states.binary_sensor.porch_motion.attributes.last_tripped_time))|round(2)}}
        seconds ago.\n{%- endif -%}"
- id: notify_tensorflow_bus
  alias: Notify Tensorflow bus
  mode: queued
  initial_state: 'on'
  condition:
  - condition: state
    entity_id: alarm_control_panel.simplisafe_2
    state: disarmed
  - condition: state
    entity_id: calendar.us_holidays
    state: 'off'
  - condition: or
    conditions:
    - condition: time
      after: 07:45:00
      before: 08:45:00
    - condition: time
      after: '15:20:00'
      before: '16:30:00'
  trigger:
  - platform: template
    value_template: '{{ ''bus'' in state_attr(''image_processing.tensorflow_driveway'',''matches'')
      }}

      '
  action:
  - service: script.sonos_say
    data:
      sonos_entity: media_player.family_room_2
      volume: 0.4
      delay: 00:00:03
      message: Bus is detected in Driveway
- id: notify_tensorflow_detection
  alias: Notify Tensorflow detection
  mode: queued
  initial_state: 'on'
  condition:
  - condition: state
    entity_id: alarm_control_panel.simplisafe_2
    state: armed_away
  - condition: template
    value_template: '{{ trigger.to_state.state |int > 0 }}'
  - condition: template
    value_template: "{%- if states.automation.notify_tensorflow_detection.attributes.last_triggered
      -%}\n  {{ (as_timestamp(now()) - as_timestamp(state_attr('automation.notify_tensorflow_detection','last_triggered')))
      > 30 }}\n{%- else -%}\n  true\n{%- endif -%}\n"
  trigger:
  - platform: state
    entity_id:
    - image_processing.tensorflow_porch
    - image_processing.tensorflow_patio
    - image_processing.tensorflow_driveway
    - image_processing.tensorflow_backyard
  action:
  - service: notify.mobile_app_alokiphone
    data_template:
      message: '{{ state_attr(trigger.entity_id,''matches'').keys()|list|unique|list|join('',
        '')|title }} detected in {{ trigger.entity_id.split(''.'')[1].split(''_'')[1]
        }} camera.

        '
      data:
        push:
          category: camera
        entity_id: camera.{{ trigger.entity_id.split('.')[1].split('_')[1] }}
        attachment:
          url: '{{ states.camera[trigger.entity_id.split(''.'')[1].split(''_'')[1]].attributes.entity_picture
            }}'
          content-type: jpg
- id: update_wordltime_path
  alias: Camera - Update worldtime Path
  initial_state: 'on'
  trigger:
  - platform: time_pattern
    minutes: /10
  action:
  - service: local_file.update_file_path
    data_template:
      entity_id: camera.worldtime
      file_path: /config/downloads/worldtime/worldtime__{{ now().strftime("%H%M")
        }}.png
- id: save_camera_images
  alias: Camera - Save images on motion
  initial_state: 'off'
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.backyard_motion
    - binary_sensor.backyard_field_detection
    - binary_sensor.backyard_line_crossing
    - binary_sensor.driveway_motion
    - binary_sensor.driveway_field_detection
    - binary_sensor.driveway_line_crossing
    - binary_sensor.patio_motion
    - binary_sensor.patio_field_detection
    - binary_sensor.patio_line_crossing
    - binary_sensor.porch_field_detection
    - binary_sensor.porch_line_crossing
    - binary_sensor.porch_motion
    from: 'off'
    to: 'on'
  action:
  - service: camera.snapshot
    data_template:
      entity_id: camera.{{ trigger.entity_id.split('.')[1].split('_')[0] }}
      filename: /config/downloads/camera/{{ trigger.entity_id.split(".")[1].split("_")[0]
        }}/{{ trigger.entity_id.split(".")[1].split("_")[0] }}_{{ now().strftime("%d%h%Y_%H%M%S")
        }}.jpg
