- id: alarm_disarm_on_arrival
  alias: Disarm alarm when someone arrives home
  triggers:
  - platform: state
    entity_id:
    - person.alok
    - person.rashmi
    - person.arnav
    to: home
  conditions:
  - condition: state
    entity_id: input_boolean.alarm_automation
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: alarm_control_panel.simplisafe_2
      state: disarmed
  actions:
    entity_id: script.alarm_standby
    action: script.turn_on
  mode: single
- id: close_garage_door_notification
  alias: Garage door open when alarm arms — notify
  triggers:
  - platform: state
    entity_id: alarm_control_panel.simplisafe_2
    to: armed_home
  - platform: state
    entity_id: alarm_control_panel.simplisafe_2
    to: armed_away
  conditions:
    condition: state
    entity_id: cover.garagedoor
    state: open
  actions:
  - data:
      message: Garage Door Open
      title: Garage Door Open
    action: notify.mobile_app_alokphone2
  - target:
      entity_id: script.notificationgaragedoor
    action: homeassistant.turn_on
- id: alarm_arm_away_on_departure
  alias: Arm alarm when everyone leaves
  mode: single
  trigger:
  - platform: state
    entity_id: group.household
    from: home
    to: not_home
    for: 00:10:00
  condition:
  - condition: state
    entity_id: input_boolean.alarm_automation
    state: 'on'
  - condition: state
    entity_id: alarm_control_panel.simplisafe_2
    state: disarmed
  action:
    service: script.turn_on
    entity_id: script.alarm_away
- id: alarm_arm_home_at_night
  alias: Arm alarm to home mode at night
  triggers:
    platform: time
    at: '22:00:00'
  conditions:
  - condition: state
    entity_id: input_boolean.alarm_automation
    state: 'on'
  - condition: state
    entity_id: group.household
    state: home
  actions:
  - target:
      entity_id: script.alarm_home
    action: script.turn_on
- id: morning_routine
  alias: Morning Routine
  condition:
    condition: state
    entity_id: group.household
    state: home
  trigger:
  - platform: time
    at: 05:20:00
  action:
  - service: automation.turn_on
    target:
      entity_id: automation.turn_off_master_lights
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.sleeping
  - service: shell_command.delete_unifi
  - condition: not
    conditions:
    - condition: state
      entity_id: alarm_control_panel.simplisafe_2
      state: disarmed
  - service: script.turn_on
    target:
      entity_id: script.alarm_standby
- id: enable_recording
  alias: Enable Recording
  trigger:
    platform: state
    entity_id: input_boolean.startrecording
    to: 'on'
  action:
    service: switch.turn_on
    entity_id: switch.foscam_record
- id: disable_recording
  alias: Disable Recording
  trigger:
    platform: state
    entity_id: input_boolean.startrecording
    to: 'off'
  action:
    service: switch.turn_off
    entity_id: switch.foscam_record
- id: notify_camera_pictures
  alias: Notify camera pictures
  condition:
  - condition: state
    entity_id: alarm_control_panel.simplisafe_2
    state: armed_away
  - condition: template
    value_template: "{%- if states.automation.notify_camera_pictures.attributes.last_triggered
      -%}\n  {{ (as_timestamp(now()) - as_timestamp(states.automation.notify_camera_pictures.attributes.last_triggered))
      > 300 }}\n{%- else -%}\n  true\n{%- endif -%}\n"
  - condition: template
    value_template: "{%- if trigger.entity_id == \"binary_sensor.backyard_field_detection\"
      or trigger.entity_id == \"binary_sensor.backyard_line_crossing\" -%} {{((as_timestamp(now())
      - as_timestamp(states.binary_sensor.backyard_motion.attributes.last_tripped_time)))|round|abs
      < 30}} {%- elif trigger.entity_id == \"binary_sensor.driveway_field_detection\"
      or trigger.entity_id == \"binary_sensor.driveway_line_crossing\" -%} {{((as_timestamp(now())
      - as_timestamp(states.binary_sensor.driveway_motion.attributes.last_tripped_time)))|round|abs
      < 30}} {%- elif trigger.entity_id == \"binary_sensor.patio_field_detection\"
      or trigger.entity_id == \"binary_sensor.patio_line_crossing\" -%} {{((as_timestamp(now())
      - as_timestamp(states.binary_sensor.patio_motion.attributes.last_tripped_time)))|round|abs
      < 30}} {%- elif trigger.entity_id == \"binary_sensor.porch_field_detection\"
      or trigger.entity_id == \"binary_sensor.porch_line_crossing\" -%} {{((as_timestamp(now())
      - as_timestamp(states.binary_sensor.porch_motion.attributes.last_tripped_time)))|round|abs
      < 30}} {%- else -%}\n  true\n{%- endif -%}\n"
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.backyard_field_detection
    - binary_sensor.driveway_field_detection
    - binary_sensor.patio_field_detection
    - binary_sensor.porch_field_detection
    - binary_sensor.backyard_line_crossing
    - binary_sensor.driveway_line_crossing
    - binary_sensor.patio_line_crossing
    - binary_sensor.porch_line_crossing
    from: 'off'
    to: 'on'
  action:
  - service: notify.mobile_app_alokphone2
    data:
      message: Check {{ trigger.entity_id.split('.')[1].split('_')[0] }} camera.
      data:
        entity_id: camera.{{ trigger.entity_id.split('.')[1].split('_')[0] }}
        attachment:
          url: '{{ states.camera[trigger.entity_id.split(''.'')[1].split(''_'')[0]].attributes.entity_picture
            }}'
          content-type: jpg
- id: update_wordltime_path
  alias: Camera - Update worldtime Path
  trigger:
  - platform: time_pattern
    minutes: /10
  action:
  - service: local_file.update_file_path
    target:
      entity_id: camera.worldtime
    data:
      file_path: /config/downloads/worldtime/worldtime__{{ now().strftime("%H%M")
        }}.png
- id: save_camera_images
  alias: Camera - Save images on motion
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.backyard_motion
    - binary_sensor.backyard_field_detection
    - binary_sensor.backyard_line_crossing
    - binary_sensor.driveway_motion
    - binary_sensor.driveway_field_detection
    - binary_sensor.driveway_line_crossing
    - binary_sensor.patio_motion
    - binary_sensor.patio_field_detection
    - binary_sensor.patio_line_crossing
    - binary_sensor.porch_field_detection
    - binary_sensor.porch_line_crossing
    - binary_sensor.porch_motion
    from: 'off'
    to: 'on'
  action:
  - service: camera.snapshot
    target:
      entity_id: camera.{{ trigger.entity_id.split('.')[1].split('_')[0] }}
    data:
      filename: /config/downloads/camera/{{ trigger.entity_id.split(".")[1].split("_")[0]
        }}/{{ trigger.entity_id.split(".")[1].split("_")[0] }}_{{ now().strftime("%d%h%Y_%H%M%S")
        }}.jpg
- id: battery_alert
  alias: Battery Alert
  trigger:
  - platform: state
    entity_id: sensor.battery_status
  condition:
  - condition: template
    value_template: '{{ trigger.to_state is not none and trigger.to_state.state |
      trim | length > 0 and trigger.to_state.state not in [''unknown'', ''unavailable'',
      ''None''] }}

      '
  action:
  - service: persistent_notification.create
    data:
      title: Low Battery levels
      notification_id: low-battery-alert
      message: 'Check battery: {{ states(''sensor.battery_status'') }}

        '
  - service: notify.mobile_app_alokphone2
    data:
      title: Battery status
      message: 'Check battery: {{ states(''sensor.battery_status'') }}

        '
- id: update_available_notification
  alias: Update Available Notification
  trigger:
    platform: template
    value_template: '{{states(''sensor.pypi_hass_version'') == states(''sensor.current_version'')
      }}'
  action:
  - service: notify.mobile_app_alokphone2
    data:
      message: HomeAssistant {{ states('sensor.pypi_hass_version') }} is now available
      title: Update HASS
  - service: persistent_notification.create
    data:
      title: Update Available
      message: 'Home Assistant {{ states(''sensor.pypi_hass_version'') }} is available,
        please update.

        '
      notification_id: update_available
- id: change_current_theme
  alias: Change Current Theme
  trigger:
  - platform: state
    entity_id: input_select.current_theme
  action:
  - service: frontend.set_theme
    data:
      name: '{{states(''input_select.current_theme'')}}'
- id: plexspy_notification
  alias: Plex Spy notification
  trigger:
    platform: state
    entity_id: sensor.plex
  action:
  - service: notify.mobile_app_alokphone2
    data:
      message: "{%- if states.sensor.plex.attributes -%}\n  {% set space = joiner('
        ') %}\n  {%- for attr in states.sensor.plex.attributes -%}\n   {%- if not
        attr==\"friendly_name\" and not attr==\"unit_of_measurement\" and not attr==\"homebridge_hidden\"
        and not attr==\"icon\"-%}\n    {{space()}}{{attr}} is watching {{states.sensor.plex.attributes[attr]}}.\n
        \  {%- endif -%}\n  {%- endfor -%}\n{%- endif -%}\n"
      title: 'Plex {{ trigger.to_state.state }} people streaming. '
      target: device/myiPhone
- id: micube_brightness_rotate
  alias: MiCube rotate - Master lights
  condition:
  - condition: state
    entity_id: light.master_lights
    state: 'on'
  trigger:
    platform: event
    event_type: xiaomi_aqara.cube_action
    event_data:
      entity_id: binary_sensor.cube_158d0001035aa7
      action_type: rotate
  action:
  - service: light.turn_on
    target:
      entity_id: light.master_lights
    data:
      brightness: "{% set state = (state_attr('light.master_lights','brightness')
        + trigger.event.data.action_value|int) -%} {%-  if state > 255 -%}\n   {%-
        set state  = 255 -%}\n{%-  elif state < 0 -%}\n   {%- set state  = 0 -%}\n{%-
        endif %} {{ state }}\n"
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.sleeping
- id: micube_scenes_reset
  alias: MiCube scene reset
  condition:
  - condition: state
    entity_id: light.master_lights
    state: 'on'
  trigger:
    platform: event
    event_type: xiaomi_aqara.cube_action
    event_data:
      entity_id: binary_sensor.cube_158d0001035aa7
      action_type: tap_twice
  action:
    service: script.set_hue_scene
    data:
      group: Master
      scene: Bright
- id: micube_master_scenes
  alias: MiCube Master scene
  condition:
  - condition: state
    entity_id: light.master_lights
    state: 'on'
  trigger:
  - platform: event
    event_type: xiaomi_aqara.cube_action
    event_data:
      entity_id: binary_sensor.cube_158d0001035aa7
      action_type: flip90
  action:
  - service: script.set_hue_scene
    data:
      group: Master
      scene: '{{ [''Arctic aurora'', ''Galaxy'', ''Starlight'', ''Nightlight'', ''Savanna
        sunset'', ''Spring blossom'', ''Tropical twilight''] | random  }}

        '
  - service: automation.turn_off
    target:
      entity_id: automation.turn_off_master_lights
- id: micube_toggle_master
  alias: MiCube Toggle Master
  trigger:
    platform: event
    event_type: xiaomi_aqara.cube_action
    event_data:
      entity_id: binary_sensor.cube_158d0001035aa7
      action_type: flip180
  action:
  - service: light.toggle
    target:
      entity_id: light.master_lights
- id: turn_off_master_lights_at_night
  alias: Turn off Master lights if they randomly turn on at night
  trigger:
  - platform: state
    entity_id:
    - light.master_1
    - light.master_2
    - light.master_3
    to: 'on'
  condition:
  - condition: state
    entity_id: alarm_control_panel.simplisafe_2
    state: armed_home
  - condition: state
    entity_id: input_boolean.sleeping
    state: 'on'
  - condition: time
    after: '22:30:00'
    before: 05:00:00
  action:
  - service: light.turn_off
    target:
      entity_id: '{{trigger.entity_id}}'
- id: prevent_overcharging
  alias: Prevent overcharging
  trigger:
  - platform: numeric_state
    entity_id: sensor.wemopowerused
    below: 2
    for: 00:05:00
  condition:
  - condition: state
    entity_id: switch.wemoinsight
    state: 'on'
  action:
    service: switch.turn_off
    target:
      entity_id: switch.wemoinsight
- id: hvac_set_prev_efficiency
  alias: HVAC set previous efficiency
  trigger:
  - platform: state
    entity_id:
    - sensor.master_temp_change
    - sensor.upstairs_temp_change
    - sensor.downstairs_temp_change
    to: '-999'
  action:
  - condition: template
    value_template: '{{ trigger.from_state is not none and trigger.from_state.state
      not in [''unknown'', ''unavailable''] }}'
  - service: input_number.set_value
    target:
      entity_id: "{%- if trigger.entity_id == 'sensor.master_temp_change' -%}\n  input_number.master_prev_eff\n{%-
        elif trigger.entity_id == 'sensor.upstairs_temp_change' -%}\n  input_number.upstairs_prev_eff\n{%-
        elif trigger.entity_id == 'sensor.downstairs_temp_change' -%}\n  input_number.downstairs_prev_eff\n{%-
        endif -%}\n"
    data:
      value: '{{ trigger.from_state.state|float(0) }}

        '
- id: hvac_set_prev_temp
  alias: HVAC set previous temperature
  trigger:
  - platform: state
    entity_id:
    - sensor.master_thermostat
    - sensor.upstairs_thermostat
    - sensor.downstairs_thermostat
    to: cooling
  - platform: state
    entity_id:
    - sensor.master_thermostat
    - sensor.upstairs_thermostat
    - sensor.downstairs_thermostat
    to: heating
  action:
  - service: input_datetime.set_datetime
    target:
      entity_id: "{%- if trigger.entity_id == 'sensor.master_thermostat' -%}\n  input_datetime.master_time\n{%-
        elif trigger.entity_id == 'sensor.upstairs_thermostat' -%}\n  input_datetime.upstairs_time\n{%-
        elif trigger.entity_id == 'sensor.downstairs_thermostat' -%}\n  input_datetime.downstairs_time\n{%-
        endif -%}\n"
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - service: input_number.set_value
    target:
      entity_id: "{%- if trigger.entity_id == 'sensor.master_thermostat' -%}\n  input_number.master_prev_temp\n{%-
        elif trigger.entity_id == 'sensor.upstairs_thermostat' -%}\n  input_number.upstairs_prev_temp\n{%-
        elif trigger.entity_id == 'sensor.downstairs_thermostat' -%}\n  input_number.downstairs_prev_temp\n{%-
        endif -%}\n"
    data:
      value: "{%- if trigger.entity_id == 'sensor.master_thermostat' -%}\n  {{state_attr(\"climate.master_homekit\",\"current_temperature\")|float}}\n{%-
        elif trigger.entity_id == 'sensor.upstairs_thermostat' -%}\n  {{state_attr(\"climate.upstairs_homekit\",\"current_temperature\")|float}}\n{%-
        elif trigger.entity_id == 'sensor.downstairs_thermostat' -%}\n  {{state_attr(\"climate.downstairs\",\"current_temperature\")|float}}\n{%-
        endif -%}\n"
- id: prevent_master_hvac_failure
  alias: Prevent master hvac failure
  trigger:
  - platform: numeric_state
    entity_id:
    - sensor.downstairs_temp_change
    - sensor.master_temp_change
    - sensor.upstairs_temp_change
    above: 20
    for: 00:05:00
  action:
  - service: notify.mobile_app_alokphone2
    data:
      message: 'Check {{ trigger.entity_id.split(''.'')[1].split(''_'')[0] }} thermostat

        '
      data:
        subtitle: '{{ trigger.entity_id.split(''.'')[1].split(''_'')[0] }} ran for
          over 20 minutes without any temperature change'
        push:
          badge: 0
- id: prevent_master_hvac_failure_2
  alias: Turn off master HVAC if it runs forever
  trigger:
  - platform: state
    entity_id:
    - climate.master_homekit
    to: cooling
    for: 00:30:00
  action:
  - service: notify.mobile_app_alokphone2
    data:
      message: 'Turning off {{ trigger.entity_id.split(''.'')[1].split(''_'')[0] }}
        thermostat

        '
      data:
        subtitle: '{{ trigger.entity_id.split(''.'')[1].split(''_'')[0] }} cooled
          for 30 minutes'
        push:
          badge: 0
  - service: climate.set_hvac_mode
    target:
      entity_id: climate.master_homekit
    data:
      hvac_mode: false
  - delay: 00:05:00
  - service: climate.set_fan_mode
    target:
      entity_id: climate.master_homekit
    data:
      fan_mode: true
- id: ensure_smart_devices_on
  alias: Ensure smart-devices are on
  triggers:
  - platform: state
    entity_id:
    - light.living_room_lights
    - light.lifx5
    - light.master_lights
    - light.kids_room_lights
    to: unavailable
    for: 00:05:00
  actions:
  - data:
      message: Check {{ trigger.to_state.name }}
      data:
        subtitle: Looks like {{ trigger.to_state.name }} is {{ trigger.to_state.state
          }}
        push:
          badge: 0
    action: notify.mobile_app_alokphone2
- id: master_lights_on
  alias: Turn on Master lights on motion
  trigger:
  - platform: state
    entity_id: binary_sensor.master_motion_occupancy
    from: 'off'
    to: 'on'
  condition:
  - condition: template
    value_template: '{% set h = now().hour %} {% set sun_setting = as_timestamp(state_attr(''sun.sun'',
      ''next_setting'')) %} {% set now_ts = as_timestamp(now()) %} {% set before_sunset
      = (sun_setting - now_ts) < 3600 %} {{ (is_state(''sun.sun'', ''below_horizon'')
      or before_sunset) and (h >= 17 or h < 5) }}

      '
  - condition: state
    entity_id: light.master_lights
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: alarm_control_panel.simplisafe_2
      state: armed_away
  - condition: state
    entity_id: input_boolean.sleeping
    state: 'off'
  - condition: state
    entity_id: input_boolean.master_occupied
    state: 'off'
  action:
  - service: light.turn_on
    target:
      entity_id: light.master_lights
    data:
      brightness: 255
  - delay: 00:00:05
  - service: script.set_hue_scene
    data:
      group: Master
      scene: Default
- id: master_lights_off
  alias: Turn off Master lights
  trigger:
  - platform: state
    entity_id: binary_sensor.master_motion_occupancy
    to: 'off'
    for: 00:03:00
  condition:
  - condition: time
    after: '17:00:00'
    before: '22:00:00'
  - condition: state
    entity_id: light.master_lights
    state: 'on'
  - condition: state
    entity_id: input_boolean.sleeping
    state: 'off'
  action:
  - service: light.turn_off
    target:
      entity_id: light.master_lights
- id: garage_lights_on
  alias: Garage lights on when door opens
  triggers:
  - platform: state
    entity_id: binary_sensor.mud_room_door_4
    from: 'off'
    to: 'on'
  - platform: state
    entity_id: cover.garagedoor
    to: open
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: cover.garagedoor
      state: closed
    - condition: state
      entity_id: sun.sun
      state: below_horizon
  actions:
    target:
      entity_id: light.lifx5
    data:
      brightness: 255
    action: light.turn_on
- id: garage_lights_off
  alias: Garage lights off when mudroom door closes
  triggers:
  - platform: state
    entity_id: binary_sensor.mud_room_door_4
    to: 'off'
    for: 00:05:00
  conditions:
  - condition: state
    entity_id: light.lifx5
    state: 'on'
  actions:
    entity_id: light.lifx5
    action: light.turn_off
- id: kitchen_light_brightness
  alias: Kitchen light brightness
  trigger:
  - platform: state
    entity_id: light.kitchen_lights
    from: 'off'
    to: 'on'
  action:
    service: light.turn_on
    target:
      entity_id: light.kitchen_lights
    data:
      brightness: 255
- id: breakfast_light_reset
  alias: Breakfast light reset
  trigger:
  - platform: state
    entity_id: light.kids_room_lights
    from: 'off'
    to: 'on'
  condition:
  - condition: template
    value_template: '{{ trigger.from_state.state == "off" }}'
  action:
    service: light.turn_on
    target:
      entity_id: light.kids_room_lights
    data:
      brightness: 255
      rgb_color:
      - 255
      - 255
      - 255
- id: turn_off_xiaomi
  alias: Turn off Xiaomi Gateway light
  trigger:
  - platform: numeric_state
    entity_id: sensor.illumination_34ce00813670
    above: 600
  condition:
  - condition: state
    entity_id: light.gateway_light_34ce00813670
    state: 'on'
  action:
  - service: light.turn_off
    target:
      entity_id: light.gateway_light_34ce00813670
- id: change_xiaomi_color
  alias: Change Xiaomi color
  condition:
  - condition: time
    after: '19:15:00'
    before: 07:45:00
  - condition: state
    entity_id: binary_sensor.living_room_occupancy
    state: 'on'
  trigger:
  - platform: time_pattern
    minutes: /15
  action:
    service: light.turn_on
    entity_id: light.gateway_light_34ce00813670
    data:
      brightness: 255
      rgb_color:
      - '{{ (range(0, 255)|random) }}'
      - '{{ (range(0, 255)|random) }}'
      - '{{ (range(0, 255)|random) }}'
- id: change_leeo_color
  alias: Change Leeo color
  condition:
  - condition: state
    entity_id: device_tracker.leeoalert
    state: home
  - condition: time
    after: '19:15:00'
    before: 07:45:00
  - condition: state
    entity_id: binary_sensor.living_room_occupancy
    state: 'on'
  trigger:
  - platform: time_pattern
    minutes: /15
  action:
    service: ifttt.trigger
    data:
      event: leeocolor
      value1: '{{ ''{:02x}{:02x}{:02x}''.format(range(0, 255) | random, range(0, 255)
        | random, range(0, 255) | random) }}'
- id: frontyard_lights
  alias: Frontyard lights on Motion
  condition:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: time
    after: '19:00:00'
    before: 05:00:00
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.ring_front_door_motion
    from: 'off'
    to: 'on'
  action:
  - service: switch.turn_on
    target:
      entity_id:
      - switch.driveway
      - switch.wemoporch
  - delay: 00:05:00
  - service: switch.turn_off
    target:
      entity_id:
      - switch.driveway
      - switch.wemoporch
- id: lifx_effects
  alias: Lifx Effects
  trigger:
  - platform: state
    entity_id: input_boolean.lifxeffects
  action:
  - service: homeassistant.turn_on
    target:
      entity_id: "{%- if trigger.to_state.state == 'on' -%}\n  script.colorloop_start\n{%-
        else -%}\n  script.lifx_stop_effects\n{%- endif -%}\n"
- id: lifx_effects_update
  alias: Lifx Effects Update
  trigger:
