  - platform: template
    covers:
      garagedoor:
        friendly_name: 'Garage Door'
        value_template: >
          {{ is_state('binary_sensor.garagedoor_2', 'on') }}
        open_cover:
          service: switch.turn_on
          entity_id: switch.shelly_garage
        close_cover:
          service: switch.turn_on
          entity_id: switch.shelly_garage
        stop_cover:
          service: switch.turn_on
          entity_id: switch.shelly_garage
        icon_template: >
          {%- if is_state('binary_sensor.garagedoor_2', 'on') -%}
            mdi:garage-open
          {%- else -%}
            mdi:garage
          {%- endif -%}
